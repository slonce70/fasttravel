# Local-dev compose. Production overrides live in docker-compose.prod.yml.
#
# Usage:
#   cp .env.example .env
#   docker compose up -d postgres redis
#   docker compose run --rm api alembic upgrade head
#   docker compose up
#
# Production:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: fasttravel

# Shared logging cap. Docker's default json-file driver has no max-size,
# so a chatty container fills the boot disk over weeks (audit #8). Every
# service inherits this via YAML anchor; override per-service if you need
# longer retention for a specific log stream.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

networks:
  fasttravel:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  grafana_data:
  prometheus_data:
  # Loki chunks + index (observability profile only).
  loki_data:

services:
  postgres:
    build:
      context: ./infra/postgres
      dockerfile: Dockerfile
    image: fasttravel/postgres:16
    container_name: ft_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fasttravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fasttravel_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-fasttravel}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      # Dev convenience — psql from host. Removed in prod overlay.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fasttravel} -d ${POSTGRES_DB:-fasttravel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fasttravel

  redis:
    image: redis:7-alpine
    container_name: ft_redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fasttravel

  api:
    build:
      # Build context spans ./apps so the API image can vendor apps/shared/.
      context: ./apps
      dockerfile: api/Dockerfile
    image: fasttravel/api:dev
    container_name: ft_api
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      # Override the host names so they point at compose service names
      # (overriding any localhost values a developer might have in .env).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      REDIS_URL: redis://redis:6379/0
      FASTTRAVEL_ALLOW_E2E_SEED: ${FASTTRAVEL_ALLOW_E2E_SEED:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fasttravel

  bot:
    # Build context spans ./apps so bot can COPY the sibling apps/shared/
    # package (Telegram publisher helpers shared with scheduler).
    build:
      context: ./apps
      dockerfile: bot/Dockerfile
    image: fasttravel/bot:dev
    container_name: ft_bot
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    # 9102 = Prometheus exporter (see apps/bot/src/infra/metrics.py).
    # 9103 = AlertManager webhook receiver (see apps/bot/src/alert_webhook.py).
    # Both internal-only via `expose`; prod nginx doesn't proxy them.
    expose:
      - "9102"
      - "9103"
    environment:
      # Bot reads /api so it talks to the api service via service-DNS.
      API_BASE_URL: http://api:8000
      # Logical Redis DB 2 — FSM state. Refresh queue stays on DB 0.
      REDIS_URL: redis://redis:6379/2
      # Direct DB for subscriber tables (bot is canonical writer).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      TELEGRAM_ALERTS_CHAT_ID: ${TELEGRAM_ALERTS_CHAT_ID:-}
      ALERTMANAGER_WEBHOOK_SECRET: ${ALERTMANAGER_WEBHOOK_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - fasttravel

  scheduler:
    # Build context spans ./apps so the scheduler Dockerfile path stays stable
    # if future jobs need sibling app assets.
    build:
      context: ./apps
      dockerfile: scheduler/Dockerfile
    image: fasttravel/scheduler:dev
    container_name: ft_scheduler
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    # 9101 is the Prometheus exporter started by src.infra.metrics. Bound to
    # the fasttravel network only; the prod overlay keeps it unpublished and
    # Prometheus scrapes via the internal DNS name `scheduler:9101`.
    expose:
      - "9101"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      # Daily «Найдешевші тури» channel digest — owner-enabled 2026-06-03.
      # Override with FT_CHEAPEST_DIGEST_ENABLED=false to turn the digest off.
      FT_CHEAPEST_DIGEST_ENABLED: ${FT_CHEAPEST_DIGEST_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fasttravel

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ft_prometheus
    restart: unless-stopped
    logging: *default-logging
    # Opt-in on the $0 single-VM deploy: `docker compose --profile observability up`.
    # Default `up` runs only postgres/redis/api/bot/scheduler to keep RAM free.
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    # Retention caps so TSDB doesn't unboundedly fill the boot disk
    # (audit 4.1 #3). 30d × 8 GB matches the free-tier VPS budget.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=8GB'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - fasttravel

  # Sprint 2.3 — AlertManager fans firing alerts out to the bot's
  # /alerts webhook (port 9103). Internal-only; the operator hits the
  # web UI by tunnelling from the host.
  # Audit quarter #17 — infra-level exporters. None of these scrape the
  # public internet; they all expose /metrics on the fasttravel network
  # so Prometheus can pull. Tiny RSS (~10-30 MB each).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ft_node_exporter
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - fasttravel

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: ft_postgres_exporter
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fasttravel

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: ft_redis_exporter
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - fasttravel

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ft_alertmanager
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    volumes:
      - ./infra/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # Webhook secret file (gitignored). AlertManager reads via
      # `credentials_file` in alertmanager.yml so the bearer token never
      # appears in the committed config.
      - ./infra/prometheus/.webhook_secret:/etc/alertmanager/webhook_secret:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - fasttravel

  # Audit Quarter #16 — log aggregation via Loki + Vector. Opt-in:
  # enable with `docker compose --profile observability up -d`. Kept
  # off by default because it adds ~300 MB of RSS and most dev work
  # doesn't need centralised logs.
  loki:
    image: grafana/loki:3.3.0
    container_name: ft_loki
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki
    networks:
      - fasttravel

  vector:
    image: timberio/vector:0.41.1-debian
    container_name: ft_vector
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    volumes:
      - ./infra/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - fasttravel

  grafana:
    image: grafana/grafana-oss:11.3.1
    container_name: ft_grafana
    restart: unless-stopped
    logging: *default-logging
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # No dev fallback to `admin` — Grafana boots only when the operator
      # provides an explicit password. Defends against the audit 2.2 bullet
      # ("Grafana default admin:admin"). production-preflight.sh enforces
      # the same invariant for prod.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - fasttravel
