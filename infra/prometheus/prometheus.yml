# Minimal Prometheus config. Scrapes the FastAPI /metrics endpoint
# (exposed via prometheus-fastapi-instrumentator).
global:
  scrape_interval: 30s
  evaluation_interval: 30s

# Alert / recording rules. Rules live under infra/prometheus/rules/ and
# are mounted by docker-compose.yml at /etc/prometheus/rules/. Use
# `promtool check rules infra/prometheus/rules/fasttravel.yml` to
# validate before commit; CI does the same in the docker-build job.
rule_files:
  - "/etc/prometheus/rules/fasttravel.yml"

# Sprint 2.3 — Prometheus pushes firing/resolved alerts to AlertManager,
# which then POSTs to the bot's /alerts webhook for Telegram delivery.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'fasttravel-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']

  # Scheduler exposes job run/duration counters via prometheus_client on
  # an internal port (no FastAPI surface). See apps/scheduler/src/infra/metrics.py.
  - job_name: 'fasttravel-scheduler'
    metrics_path: /metrics
    static_configs:
      - targets: ['scheduler:9101']

  # Bot exposes per-handler message counters + latency histogram on
  # an internal port. See apps/bot/src/infra/metrics.py.
  - job_name: 'fasttravel-bot'
    metrics_path: /metrics
    static_configs:
      - targets: ['bot:9102']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
