# AlertManager configuration.
#
# Single receiver: the bot's webhook on port 9103. The bot formats each
# alert as MarkdownV2 and posts to TELEGRAM_ALERTS_CHAT_ID. This MUST be
# a private/operator chat, not the public deals group used by post_deals.
#
# Routing strategy:
#   - Critical alerts send firing + resolved notifications.
#   - Warning alerts send firing only; resolved warnings are operational
#     noise in the shared Telegram group.
#   - 5-minute group window so multiple firing alerts (e.g. snapshot
#     fails AND deals detector goes silent in the same incident) get
#     batched into one Telegram message instead of paging the operator
#     twice.
#   - 1-hour repeat interval so an unaddressed alert keeps pinging
#     without becoming spam.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'telegram-warning'
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      continue: false

receivers:
  - name: 'telegram-critical'
    webhook_configs:
      - url: 'http://bot:9103/alerts'
        send_resolved: true
        # The bot's /alerts handler accepts the secret via either
        # `X-Webhook-Secret` (custom) or `Authorization: Bearer`. We use
        # the bearer path here because it's AlertManager-native.
        # Secret is mounted into the container at /etc/alertmanager/
        # webhook_secret by docker-compose's alertmanager service so
        # AlertManager can read it via `credentials_file` (avoids putting
        # the secret in this VCS'd yaml).
        http_config:
          authorization:
            type: 'Bearer'
            credentials_file: '/etc/alertmanager/webhook_secret'
  - name: 'telegram-warning'
    webhook_configs:
      - url: 'http://bot:9103/alerts'
        send_resolved: false
        http_config:
          authorization:
            type: 'Bearer'
            credentials_file: '/etc/alertmanager/webhook_secret'

inhibit_rules:
  # If the snapshot is stale, every downstream "no fresh prices" alert
  # is a symptom of the same incident. Suppress them until the root
  # is resolved.
  - source_match:
      alertname: 'StaleSnapshot'
    target_match_re:
      alertname: 'DealsDetectorIdle|StaleCatalog'
    equal: ['team']
