# Minimal Postgres 16 config tuned for a 24GB Oracle Ampere VM where
# Postgres shares the box with Redis + FastAPI + bot + scheduler + Grafana.
# Numbers chosen conservatively — Postgres gets ~25% of total RAM.

# --- Connections / memory ---
listen_addresses = '*'
# Audit 4.2 Medium — at concurrency=80 snapshot bursts + api+scheduler+bot
# async pools, the previous max_connections=100 was within OOM-of-clients
# range. 200 is a safer ceiling given the 24 GB RAM budget; PgBouncer
# is the next step if connections become a real bottleneck.
max_connections = 200
shared_buffers = 1GB
effective_cache_size = 4GB
work_mem = 16MB
maintenance_work_mem = 256MB

# --- Write-ahead log ---
wal_compression = on
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 80MB

# --- WAL archiving (audit Quarter #15) -------------------------------------
# Enabling archiving turns the 24 h pg_dump RPO into a near-zero RPO.
# Default is OFF here because:
#   (1) archive_command needs an R2 bucket + rclone wired on the host;
#   (2) starting archive without a working command quickly fills pg_wal/
#       and stalls the database (commits block on archive backpressure).
#
# To enable in prod, the operator:
#   1. Install rclone on the VPS and configure the [r2] remote (mirror
#      the daily-backup workflow's rclone.conf).
#   2. Place infra/postgres/pg_wal_archive.sh on the VPS at
#      /usr/local/bin/pg_wal_archive.sh and `chmod 755`.
#   3. Change `archive_mode = off` below to `on`, and
#      `archive_command = ''` to:
#         archive_command = '/usr/local/bin/pg_wal_archive.sh "%p" "%f"'
#   4. `docker compose restart postgres` and watch `pg_stat_archiver`
#      to confirm archived_count starts climbing.
#
# Until then the daily pg_dump (.github/workflows/daily-backup.yml)
# remains the only RPO line of defence (~24 h).
archive_mode    = off
archive_command = ''
archive_timeout = 300

# --- Loaded extensions -----------------------------------------------------
# pg_stat_statements added so per-query I/O timing is queryable when a
# job suddenly takes 60 min instead of 20 (audit 4.2 Medium "pg_stat_statements
# not loaded").
shared_preload_libraries = 'pg_cron,pg_stat_statements'
# Database in which pg_cron stores its job catalog
cron.database_name = 'fasttravel'

# pg_stat_statements tuning. 5000 distinct statements + track everything.
pg_stat_statements.max  = 5000
pg_stat_statements.track = all
pg_stat_statements.save = on

# --- TLS (audit 2.2 Medium "Postgres listens on 0.0.0.0, no SSL") ---
# Default OFF — acceptable on a bare-metal docker bridge (per audit:
# "silently breaks при міграції на swarm/k8s"). To enable in prod after
# moving to a multi-host network:
#   1. Generate cert + key inside the container's data dir (or mount
#      from /etc/letsencrypt with chown 999:999):
#         openssl req -new -x509 -days 365 -nodes \
#             -out server.crt -keyout server.key -subj "/CN=postgres"
#         chmod 600 server.key && chown 999:999 server.{crt,key}
#   2. Uncomment the four lines below.
#   3. Set ssl_ca_file if you want client cert verification.
#   4. docker compose restart postgres.
# ssl = on
# ssl_cert_file = '/var/lib/postgresql/data/server.crt'
# ssl_key_file  = '/var/lib/postgresql/data/server.key'
# ssl_min_protocol_version = 'TLSv1.2'

# --- Logging ---
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_line_prefix = '%t [%p] %u@%d '

# --- Statistics ---
track_io_timing = on
track_functions = pl
