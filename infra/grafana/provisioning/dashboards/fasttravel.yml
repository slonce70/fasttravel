# Grafana dashboard provisioning — load all JSONs in /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: FastTravel
    orgId: 1
    folder: FastTravel
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
