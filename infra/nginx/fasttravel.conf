# ============================================================================
# FastTravel — nginx reverse proxy.
#
# Deployment: this file is mounted into the nginx container by
# docker-compose.prod.yml. It is NOT installed into host nginx.
#
# Provision certificates on the host with `certbot certonly --standalone`
# before starting the compose nginx container, then mount /etc/letsencrypt read
# only. Replace `api.fasttravel.com.ua` in this repo file before first deploy
# if you use a different API domain.
# ============================================================================

# ---- Rate-limit zone (100 req/min/IP on /api/*) ----------------------------
# 10 MB ≈ 160 000 unique IPs tracked. Burst=20 absorbs short spikes.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=100r/m;

# ---- Cloudflare real-IP ----------------------------------------------------
# IP lists drift — refresh quarterly from https://www.cloudflare.com/ips-v4
# and https://www.cloudflare.com/ips-v6. Phase 2: add a cron that pulls these
# nightly and reloads nginx.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# ---- Compression -----------------------------------------------------------
gzip               on;
gzip_vary          on;
gzip_proxied       any;
gzip_comp_level    5;
gzip_min_length    1024;
gzip_types
  text/plain text/css text/xml text/javascript
  application/json application/javascript application/xml application/xml+rss
  application/atom+xml image/svg+xml;

# ---- HTTP → HTTPS redirect -------------------------------------------------
server {
  listen      80;
  listen      [::]:80;
  server_name api.fasttravel.com.ua;

  # Kept harmless for emergency webroot challenges. Normal issuance/renewal
  # uses host certbot standalone while this container is stopped.
  location ^~ /.well-known/acme-challenge/ {
    root /var/www/html;
    default_type "text/plain";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ---- HTTPS site ------------------------------------------------------------
server {
  listen      443 ssl;
  listen      [::]:443 ssl;
  http2       on;
  server_name api.fasttravel.com.ua;

  ssl_certificate     /etc/letsencrypt/live/api.fasttravel.com.ua/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.fasttravel.com.ua/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # ---- Security headers ----------------------------------------------------
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options    "nosniff" always;
  add_header X-Frame-Options           "SAMEORIGIN" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
  # Audit 2.2 Medium — CSP enabled. This nginx serves the JSON API ONLY
  # (the Next.js frontend lives on a separate Cloudflare Worker), so a
  # locked-down "JSON-or-die" CSP is safe: occasional HTML error pages
  # (uvicorn default 404/500) become an XSS vector without one.
  # `frame-ancestors 'none'` doubles X-Frame-Options:DENY for CSP-3
  # clients. `default-src 'none'` blocks every resource class by default.
  add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;

  # Common proxy headers (DRY via a snippet in /etc/nginx/snippets in prod).
  proxy_http_version 1.1;
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;
  proxy_connect_timeout 10s;

  # ---- Static SEO files served by the backend ------------------------------
  # robots.txt / sitemap.xml are generated by the API (so they reflect DB content).
  location = /robots.txt {
    proxy_pass http://api:8000/robots.txt;
    proxy_cache_valid 200 1h;
  }
  location = /sitemap.xml {
    proxy_pass http://api:8000/sitemap.xml;
    proxy_cache_valid 200 1h;
  }

  # ---- /api/* → FastAPI ----------------------------------------------------
  location /api/ {
    limit_req zone=api_rl burst=20 nodelay;
    limit_req_status 429;

    proxy_pass http://api:8000;
  }

  # Health is intentionally not under /api in FastAPI.
  location = /health {
    proxy_pass http://api:8000/health;
  }

  # ---- /grafana/* → Grafana (basic-auth protected) -------------------------
  # Create the htpasswd file:
  #   sudo apt-get install -y apache2-utils
  #   sudo htpasswd -c /etc/nginx/.htpasswd-grafana admin
  #
  # Grafana lives behind the opt-in `observability` compose profile, so the
  # container may legitimately be absent. A static `proxy_pass http://grafana`
  # is resolved at nginx startup and crash-loops the whole proxy (ports 80/443
  # down → public API dead) when the host is missing. Using a variable defers
  # resolution to request time via Docker's embedded DNS: without Grafana,
  # /grafana/ returns 502 and everything else keeps working.
  # NOTE: variable proxy_pass disables the automatic URI prefix swap, hence
  # the explicit rewrite.
  resolver 127.0.0.11 valid=30s ipv6=off;
  set $grafana_upstream http://grafana:3000;
  location /grafana/ {
    auth_basic           "FastTravel Grafana";
    auth_basic_user_file /etc/nginx/.htpasswd-grafana;

    rewrite ^/grafana/(.*)$ /$1 break;
    proxy_pass $grafana_upstream;
  }
  # Grafana websocket for live tail
  location /grafana/api/live/ {
    auth_basic           "FastTravel Grafana";
    auth_basic_user_file /etc/nginx/.htpasswd-grafana;

    rewrite ^/grafana/(.*)$ /$1 break;
    proxy_pass $grafana_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # ---- Catch-all: 404 (frontend lives on Cloudflare Workers, not here) -----
  location / {
    return 404 "Not Found. The web frontend is hosted on Cloudflare Workers.\n";
    add_header Content-Type text/plain;
  }
}
