# Test-only services. They do not override the live api/scheduler/bot services,
# so running pytest cannot replace ft_api with a tail container.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml build api-test scheduler-test bot-test
#   docker compose up -d postgres redis
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm --no-deps api-test pytest

services:
  api-test:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    image: fasttravel/api:test
    command: ["tail", "-f", "/dev/null"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      REDIS_URL: redis://redis:6379/0
      FASTTRAVEL_ALLOW_E2E_SEED: ${FASTTRAVEL_ALLOW_E2E_SEED:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fasttravel

  scheduler-test:
    build:
      context: ./apps
      dockerfile: scheduler/Dockerfile
      args:
        INSTALL_DEV: "true"
    image: fasttravel/scheduler:test
    command: ["tail", "-f", "/dev/null"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fasttravel

  bot-test:
    build:
      context: ./apps
      dockerfile: bot/Dockerfile
      args:
        INSTALL_DEV: "true"
    image: fasttravel/bot:test
    command: ["tail", "-f", "/dev/null"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379/2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fasttravel}:${POSTGRES_PASSWORD:-fasttravel_dev_change_me}@postgres:5432/${POSTGRES_DB:-fasttravel}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID:-}
      ALERTMANAGER_WEBHOOK_SECRET: ${ALERTMANAGER_WEBHOOK_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fasttravel
