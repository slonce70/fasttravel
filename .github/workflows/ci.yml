# CI — runs on every PR and push to main.
#
# Goals:
#   1. Catch lint/type/test regressions before merge.
#   2. Validate docker-compose definitions and that all images build.
#   3. Be cheap enough to run on every push (~5 min total wall clock).
#
# Notes for maintainers:
#   - Python services use committed Poetry locks; the frontend uses the
#     committed pnpm lockfile with a frozen install.
#   - mypy runs with continue-on-error because pyproject has strict=true but
#     the codebase isn't fully typed yet. Tighten this gate when ready.

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Cancel superseded runs on the same ref to save minutes.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  POETRY_VERSION: "1.8.4"
  PNPM_VERSION: "9.12.0"

jobs:
  # ---------------------------------------------------------------------------
  # Backend API: lint + typecheck + pytest (with Postgres + Redis services)
  # ---------------------------------------------------------------------------
  backend-lint-test:
    name: backend (api) lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      DATABASE_URL_SYNC: postgresql+psycopg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: dev
      LOG_LEVEL: WARNING
      PYTHONPATH: .:..

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip + poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('apps/api/pyproject.toml', 'apps/api/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint (ruff check)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff format)
        run: poetry run ruff format --check src/ tests/

      - name: Type check (mypy)
        # pyproject.toml has strict=true but the codebase isn't fully typed.
        # Keep this informational until we drop strict or finish typing.
        continue-on-error: true
        run: poetry run mypy src/

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        # Won't block CI if CODECOV_TOKEN is missing (open-source repos work without).
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        continue-on-error: true
        with:
          files: apps/api/coverage.xml
          flags: backend-api
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Scheduler: lint + typecheck + (pytest when a tests/ dir exists)
  # ---------------------------------------------------------------------------
  scheduler-lint-test:
    name: scheduler lint + test
    runs-on: ubuntu-latest

    # Audit Sprint #12 — scheduler tests for detect_deals / post_deals
    # were heavy-mocked because there were no Postgres/Redis services.
    # Adding them mirrors the API job's services block so future
    # integration tests (tests/integration/test_detect_deals_sql.py)
    # can run against real engines instead of fakeredis + mocked sessions.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: dev
      LOG_LEVEL: WARNING

    defaults:
      run:
        working-directory: apps/scheduler
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip + poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('apps/scheduler/pyproject.toml', 'apps/scheduler/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint (ruff check)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff format)
        run: poetry run ruff format --check src/ tests/

      - name: Type check (mypy)
        continue-on-error: true
        run: poetry run mypy src/ || true

      - name: Run tests with coverage (if tests/ exists)
        env:
          # scheduler tests import `shared.publishers` from sibling apps/shared/.
          # Pyproject pythonpath = ["."], so prepend the parent here.
          PYTHONPATH: .:..
        run: |
          if [ -d tests ] && [ -n "$(ls -A tests 2>/dev/null)" ]; then
            poetry run pytest --cov=src --cov-report=xml --cov-report=term
          else
            echo "No tests/ directory yet — skipping pytest. Remove this guard once tests are added."
          fi

  # ---------------------------------------------------------------------------
  # Ingest library: lint + test normalizers/dedup/pipeline contracts
  # ---------------------------------------------------------------------------
  ingest-lint-test:
    name: ingest lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ingest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip + poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('apps/ingest/pyproject.toml', 'apps/ingest/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint (ruff check)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff format)
        run: poetry run ruff format --check src/ tests/

      - name: Type check (mypy)
        continue-on-error: true
        run: poetry run mypy src/ || true

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov-report=xml --cov-report=term

  # ---------------------------------------------------------------------------
  # Bot: lint + test via Poetry (Audit #8 sprint — pyproject + lockfile now)
  # ---------------------------------------------------------------------------
  bot-lint-test:
    name: bot lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bot
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip + poetry virtualenv
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
          key: poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-bot-${{ hashFiles('apps/bot/pyproject.toml', 'apps/bot/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-bot-

      - name: Install Poetry
        run: pip install "poetry==${{ env.POETRY_VERSION }}"

      - name: Install dependencies
        run: poetry install --no-root --with dev

      - name: Lint (ruff check)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff format)
        run: poetry run ruff format --check src/ tests/

      - name: Run tests with coverage
        env:
          # Bot src imports `shared.publishers...` from the sibling
          # apps/shared/ directory. Poetry venv doesn't know about it,
          # so we extend PYTHONPATH at test time.
          PYTHONPATH: .:..
        run: poetry run pytest --cov=src --cov-report=xml --cov-report=term --tb=short -q

  # ---------------------------------------------------------------------------
  # Frontend (Next.js): lint + typecheck + build
  # ---------------------------------------------------------------------------
  frontend-lint-build:
    name: frontend lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (production dependencies)
        run: pnpm audit --prod --audit-level moderate

      - name: Lint (eslint via next lint)
        run: pnpm lint

      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Build (next build)
        run: pnpm build

      - name: Build Cloudflare Workers output
        run: pnpm cf:build

      - name: Upload .next build artifacts
        if: success()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-next-build
          path: |
            apps/web/.next
            !apps/web/.next/cache
          retention-days: 3
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Browser smoke: real API + Postgres + Next.js flow, seeded in an ephemeral DB.
  # ---------------------------------------------------------------------------
  browser-smoke-local:
    name: browser smoke (local API)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm test:e2e:install

      - name: Prepare compose env
        working-directory: .
        run: cp .env.example .env

      - name: Start database services
        working-directory: .
        run: docker compose up -d postgres redis

      - name: Build API image with current scripts
        working-directory: .
        run: docker compose build api

      - name: Run migrations
        working-directory: .
        run: docker compose run --rm api alembic upgrade head

      - name: Seed browser-smoke data
        working-directory: .
        env:
          FASTTRAVEL_ALLOW_E2E_SEED: "1"
        run: docker compose run --rm api python -m scripts.seed_e2e

      - name: Start API
        working-directory: .
        run: docker compose up -d api

      - name: Wait for API health
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health; then
              exit 0
            fi
            echo "API not healthy yet, retry $i/30"
            sleep 2
          done
          docker compose logs --no-color --tail=160 api
          exit 1

      - name: Run browser smoke
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_TELEGRAM_CHANNEL_URL: https://t.me/testtyhhh
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-browser-smoke-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump compose logs
        if: failure()
        working-directory: .
        run: docker compose logs --no-color --tail=200

      - name: Stop compose services
        if: always()
        working-directory: .
        run: docker compose down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # Docker smoke build: validate compose + build every image (no push).
  # ---------------------------------------------------------------------------
  docker-build:
    name: docker compose validate + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Prepare .env for compose validation
        # docker compose config interpolates ${VAR} so we need a populated .env.
        # We just copy the example — no real secrets needed for `config`/`build`.
        run: cp .env.example .env

      - name: Validate docker-compose config
        run: docker compose config --quiet

      - name: Validate docker-compose.test.yml overlay
        # The test overlay flips INSTALL_DEV=true; we just validate the
        # overlay merges cleanly with the base. Running `pytest` against
        # this overlay happens via the language-specific jobs above, which
        # are faster than building images.
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml config --quiet

      - name: Install preflight tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Production preflight
        run: infra/scripts/production-preflight.sh

      - name: Build images
        # We deliberately do NOT push. Just confirms every Dockerfile builds.
        run: docker compose build --pull
