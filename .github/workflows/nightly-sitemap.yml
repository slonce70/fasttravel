# Nightly sitemap regeneration.
#
# Flow (target / not yet implemented end-to-end):
#   1. SSH to VPS, run the sitemap generator inside the api container.
#   2. Pick up sitemap.xml from the runner, push it to the R2 bucket that
#      Cloudflare Pages serves from (or to the Pages project directly).
#   3. (Optional) Ping Google / IndexNow.
#
# MVP placeholder: we stand up the trigger + secrets gate so the schedule is
# in place. Real implementation lands when apps/api/scripts/generate_sitemap.py
# exists and the R2/Pages destination is decided.
# TODO(devops): wire the SSH + rclone steps once:
#   - apps/api/scripts/generate_sitemap.py is implemented, OR
#   - the api exposes POST /api/admin/sitemap/regenerate with admin auth.

name: Nightly Sitemap

on:
  schedule:
    # 02:00 UTC = 04:00 Europe/Kyiv (summer). Off-peak.
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-sitemap
  cancel-in-progress: false

jobs:
  sitemap:
    name: regenerate + upload sitemap
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_SITEMAP_BUCKET: ${{ secrets.R2_SITEMAP_BUCKET }}

    steps:
      - name: Gate — skip when VPS / R2 secrets missing
        id: gate
        run: |
          if [ -z "${DEPLOY_SSH_HOST}" ] || [ -z "${R2_ACCOUNT_ID}" ] || [ -z "${R2_SITEMAP_BUCKET}" ]; then
            echo "Skipping: deploy/R2 secrets not configured (local-first phase)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Placeholder — print TODO
        if: steps.gate.outputs.skip != 'true'
        run: |
          echo "==> Sitemap regeneration not yet implemented."
          echo "    Implement apps/api/scripts/generate_sitemap.py, then update this workflow"
          echo "    to ssh + run it and rclone the output to r2:${R2_SITEMAP_BUCKET}/sitemap.xml."

