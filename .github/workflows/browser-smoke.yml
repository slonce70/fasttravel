# Manual browser smoke against a deployed FastTravel frontend.
#
# Local E2E (`pnpm test:e2e`) starts Next.js on 127.0.0.1:3100 and requires a
# local API at :8000. This workflow is for production/staging cutover proof:
# it points the same Playwright suite at a real deployed URL.

name: Browser Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed frontend URL, e.g. https://fasttravel.com.ua"
        required: true
        type: string

concurrency:
  group: browser-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"

jobs:
  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm test:e2e:install

      - name: Run browser smoke
        env:
          WEB_E2E_BASE_URL: ${{ inputs.base_url }}
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          retention-days: 7
          if-no-files-found: ignore
