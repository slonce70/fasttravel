# Daily PostgreSQL backup → Cloudflare R2.
#
# Flow:
#   1. SSH into the production VPS.
#   2. Dump the fasttravel database via the running postgres container.
#   3. gzip the dump locally on the VPS.
#   4. Copy it down to the runner.
#   5. Restore it into a clean temporary Postgres container.
#   6. Upload to R2 (S3-compatible).
#   7. Retain the most recent 30 dumps; delete older.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   BACKUP_SSH_HOST          — IP or hostname of the VPS (e.g. 1.2.3.4)
#   BACKUP_SSH_USER          — SSH user with docker compose access (e.g. fasttravel)
#   BACKUP_SSH_KEY           — Full private SSH key (PEM, OpenSSH format)
#   BACKUP_SSH_KNOWN_HOSTS   — Output of `ssh-keyscan <host>` for the VPS
#   R2_ACCOUNT_ID            — Cloudflare account ID
#   R2_ACCESS_KEY_ID         — R2 API token (S3 access key)
#   R2_SECRET_ACCESS_KEY     — R2 API token (S3 secret)
#   R2_BUCKET                — Bucket name (e.g. fasttravel-backups)
#   BACKUP_AGE_RECIPIENT     — age public key (`age1...`) used to encrypt
#                              dumps before upload. Generate locally with
#                              `age-keygen` and keep the private key
#                              OFFLINE in a password manager / Yubikey.
#                              Audit P0 #5: R2 server-side encryption uses
#                              Cloudflare-managed keys, so a leaked R2
#                              token would yield plaintext dumps. age makes
#                              the R2 ciphertext useless without the
#                              private key.
#
# Graceful skip: while we're in local-first phase (no VPS/R2 yet), the workflow
# checks the full backup secret contract and no-ops if any required value is
# empty. This keeps scheduled runs from spamming red Xs in the Actions tab.

name: Daily Backup

on:
  schedule:
    # 01:00 UTC = 03:00 Europe/Kyiv (summer time). Cron is always UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: daily-backup
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BACKUP_SSH_HOST: ${{ secrets.BACKUP_SSH_HOST }}
      BACKUP_SSH_USER: ${{ secrets.BACKUP_SSH_USER }}
      BACKUP_SSH_KEY: ${{ secrets.BACKUP_SSH_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      BACKUP_AGE_RECIPIENT: ${{ secrets.BACKUP_AGE_RECIPIENT }}

    steps:
      - name: Gate — skip when VPS / R2 secrets missing (local-first phase)
        id: gate
        run: |
          missing=()
          for name in \
            BACKUP_SSH_HOST BACKUP_SSH_USER BACKUP_SSH_KEY R2_ACCOUNT_ID \
            R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET \
            BACKUP_AGE_RECIPIENT
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping: backup secret(s) not configured: ${missing[*]}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure SSH
        if: steps.gate.outputs.skip != 'true'
        env:
          BACKUP_SSH_KNOWN_HOSTS: ${{ secrets.BACKUP_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${BACKUP_SSH_KEY}" > ~/.ssh/id_backup
          chmod 600 ~/.ssh/id_backup
          # Audit 2.4 Low — fail-loud if known_hosts isn't pre-seeded.
          # ssh-keyscan TOFU was MITM-able on first run and sticky after.
          if [ -z "${BACKUP_SSH_KNOWN_HOSTS}" ]; then
            echo "ERROR: BACKUP_SSH_KNOWN_HOSTS secret is required."
            echo "Capture it once with: ssh-keyscan -H <vps_host>"
            exit 1
          fi
          echo "${BACKUP_SSH_KNOWN_HOSTS}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Install rclone + age
        if: steps.gate.outputs.skip != 'true'
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          # age is in apt as of Ubuntu 22.04; ubuntu-latest is 24.04 so
          # this is a one-liner. Version pin not strictly required —
          # age has a hard backward-compat policy.
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq age
          age --version

      - name: Configure rclone for Cloudflare R2
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF
          chmod 600 ~/.config/rclone/rclone.conf

      - name: Dump database on VPS
        if: steps.gate.outputs.skip != 'true'
        id: dump
        run: |
          set -euo pipefail
          STAMP=$(date -u +%F-%H%M%S)
          # Audit 4.2 Medium "pg_dump у plain SQL format (не -Fc)" —
          # custom format ships compressed AND can be restored with
          # `pg_restore -j N` for parallel I/O. Plain-SQL restore is
          # single-threaded; for a multi-GB DB that meant a 30-60 min
          # RTO. -Fc cuts restore wall-clock to ~5 min on 4 vCPU.
          REMOTE_PATH="/tmp/fasttravel-backup-${STAMP}.dump"
          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"
          echo "remote_path=${REMOTE_PATH}" >> "$GITHUB_OUTPUT"

          ssh -i ~/.ssh/id_backup -o BatchMode=yes "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" \
            "cd /opt/fasttravel && docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T postgres \
              pg_dump -U \"\$POSTGRES_USER\" -d \"\$POSTGRES_DB\" -Fc --compress=9 --no-owner --clean --if-exists \
              > ${REMOTE_PATH} && ls -lh ${REMOTE_PATH}"

      - name: Pull dump to runner
        if: steps.gate.outputs.skip != 'true'
        run: |
          mkdir -p ./backups
          scp -i ~/.ssh/id_backup -o BatchMode=yes \
            "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}:${{ steps.dump.outputs.remote_path }}" \
            ./backups/

      - name: Validate dump archive
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          DUMP="./backups/$(basename '${{ steps.dump.outputs.remote_path }}')"
          test -s "${DUMP}"
          # -Fc dumps start with "PGDMP" magic bytes; `pg_restore --list`
          # parses the TOC without applying anything — fast structural
          # validation that catches truncation/corruption.
          docker run --rm -v "$(pwd)/backups:/backups:ro" postgres:16-alpine \
            pg_restore --list "/backups/$(basename "${DUMP}")" | head -5

      - name: Restore drill
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ./infra/scripts/backup-restore-drill.sh \
            "./backups/$(basename '${{ steps.dump.outputs.remote_path }}')"

      - name: Encrypt dump with age (BEFORE upload)
        if: steps.gate.outputs.skip != 'true'
        id: encrypt
        run: |
          set -euo pipefail
          PLAIN="./backups/$(basename '${{ steps.dump.outputs.remote_path }}')"
          CIPHER="${PLAIN}.age"
          # age encrypts to one or more recipients; the BACKUP_AGE_RECIPIENT
          # secret is the public key (`age1...`). Only holders of the
          # corresponding private key can decrypt — Cloudflare can't
          # (their R2 server-side encryption uses Cloudflare-managed keys).
          age -r "${BACKUP_AGE_RECIPIENT}" -o "${CIPHER}" "${PLAIN}"
          # Wipe the plaintext from the runner so the upload step can
          # only see ciphertext.
          rm -f "${PLAIN}"
          ls -lh "${CIPHER}"
          echo "cipher=$(basename "${CIPHER}")" >> "$GITHUB_OUTPUT"

      - name: Upload to R2 (ciphertext only)
        if: steps.gate.outputs.skip != 'true'
        run: |
          rclone copy ./backups/ "r2:${R2_BUCKET}/postgres/" \
            --s3-no-check-bucket --progress
          rclone lsl "r2:${R2_BUCKET}/postgres/" | tail -5

      - name: Cleanup remote tmp file
        if: always() && steps.gate.outputs.skip != 'true'
        run: |
          ssh -i ~/.ssh/id_backup -o BatchMode=yes "${BACKUP_SSH_USER}@${BACKUP_SSH_HOST}" \
            "rm -f ${{ steps.dump.outputs.remote_path }}" || true

      - name: Retain last 30 backups (delete older)
        if: steps.gate.outputs.skip != 'true'
        run: |
          # List all backups newest-first, skip the 30 newest, delete the rest.
          # Filter to .age only so any legacy unencrypted .sql.gz survives
          # until an operator audits + removes them by hand. New uploads
          # are always .age after the encryption step above.
          rclone lsf "r2:${R2_BUCKET}/postgres/" --files-only \
            | grep -E '\.age$' \
            | sort -r \
            | tail -n +31 \
            | while read -r f; do
                if [ -n "$f" ]; then
                  echo "Deleting old backup: $f"
                  rclone deletefile "r2:${R2_BUCKET}/postgres/$f" || true
                fi
              done
